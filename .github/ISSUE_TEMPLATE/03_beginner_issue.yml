name: Beginner Issue Template
description: Create a beginner issue for contributors ready to learn the codebase and own a small implementation.
labels: ["beginner"]
assignees: []
body:

  - type: markdown
    attributes:
      value: |
        ---
        ## **Thanks for creating a beginner issue!** 😊

        Beginner issues are well-scoped tasks designed to help you learn the codebase and follow best-practices.

        Read more:
        > [Contribution Workflow](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/contributor-workflow.md)
        > [Contributor Setup](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/contributor-setup.md) (OS Guides: [Mac](https://github.com/hiero-ledger/hiero-website/blob/main/docs/setup/Macbook_setup.md) | [Windows](https://github.com/hiero-ledger/hiero-website/blob/main/docs/setup/windows_setup.md) | [Linux](https://github.com/hiero-ledger/hiero-website/blob/main/docs/setup/linux_setup.md))
        ---

  - type: textarea
    id: intro
    attributes:
      label: 🧑‍🎓 Beginner Issue
      description: |
        Adapt as needed. Welcome message.
      value: |
        Welcome! This is a **[Beginner Issue](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20label%3A%22beginner%22%20repo%3Ahiero-ledger%2Fhiero-website)** designed to help you learn the codebase.

        🏁 **When this issue is complete, you will have:**

        ✅ Researched a component or module in detail
        ✅ Followed existing patterns to implement a solution
        ✅ Researched and identified appropriate approaches to solve the problem
        ✅ Created basic tests
        ✅ Delivered a clean, review-ready pull request

  - type: textarea
    id: problem
    attributes:
      label: 🐞 Problem Description
      description: |
        Describe the issue so it is easy for a beginner contributor to understand what needs to be done and why. 
        Include which file(s) to look at, what the current behaviour is, and what the desired behaviour is.    
      value: |
        <!-- Describe the issue here -->  

        <!-- Identify which files to look at and patterns to recognise -->  

    validations:
      required: true


  - type: textarea
    id: solution
    attributes:
      label: 💡 Expected Solution
      description: |
        Briefly describe what the contributor should build or fix.
        This should be a short summary of the expected outcome — not a detailed implementation guide.
      value: |
        <!-- Describe the solution here -->
    validations:
      required: true

  - type: textarea
    id: research
    attributes:
      label: 🔍 Research Pointers
      description: |
        Point the contributor toward relevant files, similar components, or documentation to study.
        This is the most important, "investigate before you code" step.
        Think: what would a colleague tell you if you asked "where do I start?"
        Include links to React/Next.js documentation if the task involves a specific concept.
      value: |
        <!-- Replace this with research pointers. -->

        <!-- Link to similar examples or React/Next.js/TypeScript documentation. -->

        **Blog & Content Workflow:**
        - [Writing Blog Posts](https://github.com/hiero-ledger/hiero-website/blob/main/docs/blogs.md) — covers the current posting flow, front matter format, and content conventions

        **Project Conventions:**
        - Components live in `src/components/` — follow existing patterns for props, naming, and file structure
        - Pages are under `src/app/` using the Next.js App Router
        - Content (blog posts, etc.) lives in `content/`
        - Styling uses [Tailwind CSS](https://tailwindcss.com/docs)
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: 🛠️ Implementation Notes
      description: |
        Briefly outline the implementation, nudging them to research and make their own decisions.
      value: |
        <!-- Outline how to apply the research and build the implementation. -->
    validations:
      required: true

  - type: textarea
    id: beginner_contributors
    attributes:
      label: 🧠 Beginner Contributors — Prerequisites & Expectations
      description: |
        Adapt as needed. Concrete requirements before claiming this beginner issue. Adapt as needed.
      value: |
        > [!CAUTION]
        > **Beginner issues are low-risk but we expect a working solution.**

        > [!IMPORTANT]
        > We recommend completing at least 3 good first issues before attempting a beginner issue.

        **Difficulty:**

        - Requires building knowledge of the specific file(s)
        - Beginner to intermediate web development skills

        > [!TIP]
        > **You should be comfortable with:**
        > - Forking, branching, committing (with DCO + GPG signing), and opening a pull request without a tutorial
        > - Reading beginner to intermediate React/TypeScript code you did not write and following its patterns
        > - Handling simple merge conflicts
        > - Keeping your fork up to date with main by [rebasing](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/rebasing.md)
        > - Looking things up on your own before asking for help

        If any of that feels unfamiliar, good first issues might still be the most rewarding path for you right now — [find one here](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20label%3A%22good%20first%20issue%22%20repo%3Ahiero-ledger%2Fhiero-website).
        You can always come back when you are ready.

        ### ⚠️ AI Usage Policy

        - AI can help you understand the codebase and the problem
        - Using AI to generate code for beginner issues is **strictly discouraged**
        - Using AI as the main source of research is **strictly discouraged**, refer to React, Next.js, and TypeScript documentation.

        ### ⏱️ Timeline & Workflow
        - **Typical time:** ~1 Week / ~8 hours.
        🧩 Difficulty: Manageable but requires investigation and testing
        🎓 Best for: Beginner contributors

        - 🔴 Completing a beginner issue in 1–3 hours is a **red flag**.

        > [!TIP]
        > **Suggested:** share your proposed implementation approach as a comment before writing code to get early feedback and avoid wasted effort.

  - type: textarea
    id: testing
    attributes:
      label: 🧪 Testing Requirements
      description: |
        Edit this section to set clear expectations for testing. 
        What types of tests should they write? How should they run them? What should they link in their PR as evidence?
      value: |
        > [!IMPORTANT]
        > At the beginner level, **testing will be necessary but a small component**.
        > The components or functions you implement should be verified (happy path at least)

        How you test depends on the type of change.

        **Component or source code changes (e.g. in `src/`):**
        - Write basic unit tests using Vitest and React Testing Library
        - Run tests locally: `pnpm test`
        - Verify the dev server renders correctly: `pnpm dev`

        **GitHub Actions / workflow changes (e.g. in `.github/`):** [Guide](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/github-action-workflows.md)
        - Test by merging to your fork's `main` and simulating the scenario

        **Content or styling changes:**
        - Run the dev server and confirm visual output matches expected behavior
        - Check responsive behavior across screen sizes

  - type: textarea
    id: quality_standards
    attributes:
      label: 🛡️ Quality & Review Standards
      description: |
        Adapt as needed. The quality standards expected for beginner PRs.
      value: |        
        Beginner PRs must be **working and follow best practices**.

          1. **Working:** The implementation must solve the problem and meet the acceptance criteria.
          3. **Best Practices:** The solution should fit well with existing component patterns and project conventions.
          5. **Testing:** basic unit tests to demonstrate the implementation works as expected.

        **⚠️ Breaking changes**
        - Watch for any changes that could impact existing pages or components, even if they seem small.

        **🤖 AI notes**
        - AI has gaps or incorrect understanding of repo-specific patterns and component structures.

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ PR Quality Checklist
      description: |
        Adapt as needed. These are the standards the contributor must meet before opening a PR.
      value: |
        Before opening your PR, confirm:

        - [ ] I have spent the majority of my time researching the problem and building my understanding of the codebase and components.
        - [ ] My implementation works and is tested (if applicable).
        - [ ] Every line of code is personally understood and explainable.
        - [ ] My changes address what the issue asked for — nothing more, nothing less
        - [ ] I have run the following commands locally and **all pass** (CI will automatically fail your PR if any of these fail):
          - `pnpm format:check` — checks code formatting
          - `pnpm lint` — runs the linter (**the CI lint check will block your PR if this fails**)
          - `pnpm test` — runs the test suite
          - `pnpm build` — ensures the project builds successfully
          - [Testing guide](https://github.com/hiero-ledger/hiero-website/blob/main/docs/06-testing-and-quality-checks.md)

        Before requesting a review, confirm:
        - [ ] I did not modify files unrelated to this issue
        - [ ] Clean git history — no rebase artifacts, merge commits, or unrelated files
        - [ ] My commits are signed: `git commit -S -s -m "chore: description"` — [Signing guide](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/signing.md)
        - [ ] I have included appropriate tests and all CI checks pass.

  - type: textarea
    id: contribution_steps
    attributes:
      label: 📋 Workflow quick reference
      description: |
        Pre-filled reminders.
      value: |
        You have done this before — here are the links if you need them:

        | Step | Guide |
        |------|-------|
        | Claim this issue | Comment `/assign` below |
        | Sync with main | [Rebasing guide](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/rebasing.md) |
        | Open a PR and link this issue | [PR guide](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/contributor-workflow.md) |
        | Resolve merge conflicts | [Merge conflicts guide](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/merge_conflicts.md) |

  - type: textarea
    id: resources
    attributes:
      label: 📚 Resources & Support
      value: |
        **🆘 Stuck?**
        > [!TIP]
        > **Comment on this issue:** and describe what you have tried. A maintainer will respond.

        **References:**
        - [Next.js Documentation](https://nextjs.org/docs)
        - [React Documentation](https://react.dev)
        - [Tailwind CSS Documentation](https://tailwindcss.com/docs)
        - [Vitest Documentation](https://vitest.dev)
        - [Writing Blog Posts](https://github.com/hiero-ledger/hiero-website/blob/main/docs/blogs.md)
        - [Community Calls](https://zoom-lfx.platform.linuxfoundation.org/meetings/hiero?view=week)
        - [Discord](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/discord.md)
