name: Intermediate Issue Template
description: Create a well-documented issue for contributors ready to own larger tasks independently
labels: ["intermediate"]
assignees: []
body:

  - type: markdown
    attributes:
      value: |
        ---
        ## **Thanks for creating an intermediate issue!** 😊

        Intermediate issues are complex tasks requiring significant independent research.

        Read more:
        > [Contribution Workflow](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/contributor-workflow.md)
        > [Contributor Setup](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/contributor-setup.md) (OS Guides: [Mac](https://github.com/hiero-ledger/hiero-website/blob/main/docs/setup/Macbook_setup.md) | [Windows](https://github.com/hiero-ledger/hiero-website/blob/main/docs/setup/windows_setup.md) | [Linux](https://github.com/hiero-ledger/hiero-website/blob/main/docs/setup/linux_setup.md))
        ---

  - type: textarea
    id: intro
    attributes:
      label: 🧑‍💻 Intermediate Issue
      description: |
        Adapt as needed. Welcome message.
      value: |
        Welcome! This is an **[Intermediate Issue](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20label%3A%22intermediate%22%20repo%3Ahiero-ledger%2Fhiero-website)** touching core website architecture.

        🏁 **When this issue is complete, you will have:**

        ✅ Researched across multiple files and modules
        ✅ Owned implementation decisions
        ✅ Written thorough, meaningful tests
        ✅ Delivered a clean, review-ready pull request

  - type: textarea
    id: problem
    attributes:
      label: 🐞 Problem Description
      description: |
        Clearly articulate the problem and its impact.
        Assume the reader can navigate src/, components/, and pages/.
        Explain: what is wrong or missing, where it lives, and why it matters.      
      value: |
        <!-- Describe the issue here -->      
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Expected Solution
      description: |
        Briefly state what the contributor should build or fix.
        This should be a short summary of the expected outcome — not a detailed implementation guide.
      value: |
        <!-- Describe the solution here -->
    validations:
      required: true

  - type: textarea
    id: research
    attributes:
      label: 🔍 Background Research
      description: |
        Point the contributor toward relevant files, similar components, or documentation to study.
        This is the most important, "investigate before you code" step.
      value: |
        <!-- Describe the research pointers here -->

        <!-- Point to similar high-quality implementations here -->

        <!-- Link to React, Next.js, or TypeScript documentation here -->

    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: 🛠️ Implementation Notes
      description: |
        Guide the quality of their work with clear constraints.
      value: |
        <!-- Clarify any key risk areas -->

        <!-- Clarify any constraints -->

    validations:
      required: true

  - type: textarea
    id: domains
    attributes:
      label: 🔬 Technical Domains
      description: |
        Adapt as needed. Technical areas this issue touches to help developers self-select based on expertise.
      value: |
        <!-- Edit Technical Domains If needed -->      

        - [ ] **Intermediate to Advanced Web Development** (React components, hooks, state management, Next.js routing)
        - [ ] **Component Architecture** (reusable components, props design, composition patterns)
        - [ ] **Styling & Responsiveness** (Tailwind CSS, responsive design, accessibility)
        - [ ] **Performance** (image optimization, lazy loading, Core Web Vitals)
        - [ ] **Testing** (unit, integration, snapshot, accessibility testing)


  - type: textarea
    id: intermediate_contributors
    attributes:
      label: 🧠 Intermediate Contributors — Prerequisites & Expectations
      description: |
        Adapt as needed. Concrete requirements before claiming this intermediate issue. Adapt as needed.
      value: |
        > [!CAUTION]
        > **Intermediate issues are high-risk. We expect more than just a 'working solution' and will recommend beginner issues if the PR does not meet these standards.**

        ### 🏁 Concrete Prerequisites
        - **Web Development Skills:** Intermediate or advanced React/TypeScript/Next.js skills.
        - **Expertise:** Strong understanding of files related to this issue (research before claiming!).
        - **Proven History:** Successfully completed **≥ 5 beginner issues** in this repo.

        > [!NOTE]
        > **CI/CD Exception:** For issues focused on **GitHub Actions / Workflows**, the repo-specific thresholds above may be waived if the contributor demonstrates intermediate-level proficiency in CI/CD.

        If this feels like too big a step, that is completely fine — try a [Beginner Issue](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20label%3A%22beginner%22%20repo%3Ahiero-ledger%2Fhiero-website) first or a different **[Intermediate Issue](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20label%3A%22intermediate%22%20repo%3Ahiero-ledger%2Fhiero-website)**. You can always come back when you are ready.

        ### ⚠️ AI Usage Policy

        - Using AI to generate code for Intermediate issues is **strictly discouraged**
        - Using AI as the main source of research is **strictly discouraged**, refer to React, Next.js, and TypeScript documentation.

        ### ⏱️ Timeline & Workflow
        - **Typical time:** ~2 weeks / ~25 hours.
        - 🔴 Completing an intermediate issue in 1–3 days is a **red flag**.

        > [!TIP]
        > **Suggested:** share your proposed implementation approach as a comment before writing code to get early feedback and avoid wasted effort.

  - type: textarea
    id: testing
    attributes:
      label: 🧪 Testing Requirements
      description: |
        Edit this section to set clear expectations for testing. 
        What types of tests should they write? How should they run them? What should they link in their PR as evidence?
      value: |
        How you test depends on the type of change.

        > [!IMPORTANT]
        > At the intermediate level, **testing is a major component**.
        > Each component or function you implement should be verified. Tests should cover happy paths,
        > edge cases, and error handling.

        **Component or source code changes (e.g. in `src/`):**
        - Write unit tests covering happy path, edge cases, and error handling
        - Run tests locally: `pnpm test`
        - Verify the dev server renders correctly: `pnpm dev`
        - Check consistency with similar components already in the codebase — use the same patterns

        **GitHub Actions / workflow changes (e.g. in `.github/`):** [Guide](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/github-action-workflows.md)
        - Test by merging to your fork's `main` and simulating the scenario
        - Create test issues or PRs as evidence and link them in your PR
        - Include screenshots of workflow runs where applicable

        **Content, styling, or layout changes:**
        - Run the dev server and confirm visual output matches expected behavior
        - Compare your changes with similar existing pages for consistency
        - Check responsive behavior and accessibility


  - type: textarea
    id: quality_standards
    attributes:
      label: 🛡️ Quality & Review Standards
      description: |
        Adapt as needed. The quality standards expected for intermediate PRs.
      value: |
        Intermediate PRs must be **"working, maintainable, and aligned with project architecture."**

          1. **Working:** The implementation must solve the problem and meet the acceptance criteria.
          2. **Maintainable:** Code should be clear and concise enough for others to understand and debug without your assistance.
          3. **Architectural Alignment:** The solution should fit well with existing component patterns and project conventions.
          4. **Backward Compatibility:** Existing pages and components must not break. 
          5. **Comprehensive Testing:** Must include unit tests covering all new logic paths, edge cases, and failure modes. AI generated tests based on AI generated code is grounds for immediate rejection.

        **⚠️ Breaking changes**
        - Before changing any component API, prop interface, or public-facing layout — stop and check
        - If a breaking change is unavoidable: get explicit maintainer approval **before** implementing
        - All existing tests should pass as-is.

        **🤖 AI notes**
        - AI often has out-dated real-world knowledge: it will not be able to identify current packages.
        - AI has gaps or incorrect understanding of repo-specific patterns, logic, and component structures.

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ PR Quality Checklist
      description: |
        Adapt as needed. These are the standards the contributor must meet before opening a PR.
      value: |
        Before opening your PR, confirm:

        - [ ] I have spent the majority of my time researching the problem and solution space extensively, including reviewing relevant code, documentation, and external resources.
        - [ ] My implementation works but is also of high quality - including maintainability, readability, and architectural fit.
        - [ ] I have checked for breaking changes - no existing pages or components regress.
        - [ ] The design fits with the current website's architectural approaches.
        - [ ] Every line of code is personally understood and explainable.

        Before requesting a review, confirm:
        - [ ] I have reviewed the diff line by line.
        - [ ] My implementation fully addresses the problem described above.
        - [ ] I did not modify files unrelated to this issue
        - [ ] Clean git history — no rebase artifacts, merge commits, or unrelated files
        - [ ] My commits are signed: `git commit -S -s -m "chore: description"` — [Signing guide](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/signing.md)
        - [ ] I have run the following commands locally and **all pass** (CI will automatically fail your PR if any of these fail):
          - `pnpm format:check` — checks code formatting
          - `pnpm lint` — runs the linter (**the CI lint check will block your PR if this fails**)
          - `pnpm test` — runs the test suite
          - `pnpm build` — ensures the project builds successfully
          - [Testing guide](https://github.com/hiero-ledger/hiero-website/blob/main/docs/06-testing-and-quality-checks.md)
        - [ ] I have included appropriate tests and all CI checks pass.
        - [ ] Double and triple check — intermediate PRs are time-consuming to review

  - type: textarea
    id: resources
    attributes:
      label: 📚 Resources & Support
      value: |
        **🆘 Stuck?**
        > [!TIP]
        > **Comment on this issue:** and describe what you have tried. A maintainer will respond.

        **References:**
        - [Next.js Documentation](https://nextjs.org/docs)
        - [React Documentation](https://react.dev)
        - [Community Calls](https://zoom-lfx.platform.linuxfoundation.org/meetings/hiero?view=week)
        - [Discord](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/discord.md)
