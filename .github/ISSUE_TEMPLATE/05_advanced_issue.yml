name: Advanced Issue Template
description: For expert contributors tackling architectural, multi-module, or core-logic changes.
labels: ["advanced"]
assignees: []

body:

  - type: markdown
    attributes:
      value: |
        ---
        ## **Thanks for creating an advanced issue!** 😊

        Advanced issues are high-ownership, high-impact tasks requiring expert-level architectural understanding and significant independent research.

        Read more:
        > [Contribution Workflow](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/contributor-workflow.md)
        > [Contributor Setup](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/contributor-setup.md) (OS Guides: [Mac](https://github.com/hiero-ledger/hiero-website/blob/main/docs/setup/Macbook_setup.md) | [Windows](https://github.com/hiero-ledger/hiero-website/blob/main/docs/setup/windows_setup.md) | [Linux](https://github.com/hiero-ledger/hiero-website/blob/main/docs/setup/linux_setup.md))
        ---

  - type: textarea
    id: intro
    attributes:
      label: 🧑‍🔬 Advanced Issue
      description: |
        Adapt as needed. Welcome message.
      value: |
        Welcome! This is an **[Advanced Issue](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20label%3A%22advanced%22%20repo%3Ahiero-ledger%2Fhiero-website)** touching core website architecture.

        It is designed for expert contributors who have demonstrated deep architectural understanding and a proven track record of high-quality contributions.

  - type: textarea
    id: problem
    attributes:
      label: 🐞 Problem Description
      description: |
        Clearly articulate the problem and its impact. The solution may be unclear or require significant research.
      value: |
        <!-- Describe the issue here -->      
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: 🛠️ Implementation Notes
      description: |
        Provide implementation context to understand the complexity and possible approaches.

        Add:
        - Implementation ideas
        - Clarify what is unknown or uncertain about the implementation
        - Highlight any key risks or complexities
      value: |
        <!-- Describe the implementation notes -->

        **Blog & Content Workflow:**
        - [Writing Blog Posts](https://github.com/hiero-ledger/hiero-website/blob/main/docs/blogs.md) — covers the current posting flow, front matter format, and content conventions

        **Project Conventions:**
        - Components live in `src/components/` — follow existing patterns for props, naming, and file structure
        - Pages are under `src/app/` using the Next.js App Router
        - Content (blog posts, etc.) lives in `content/`
        - Styling uses [Tailwind CSS](https://tailwindcss.com/docs)
    validations:
      required: true

  - type: textarea
    id: advanced_contributors
    attributes:
      label: 🧠 Advanced Contributors — Prerequisites & Expectations
      description: |
        Adapt as needed. Concrete requirements before claiming this advanced issue. Adapt as needed.
      value: |
        > [!CAUTION]
        > **Advanced issues are the highest-risk work in this project. We will reject PRs that do not meet these standards.**

        ### 🏁 Concrete Prerequisites
        - **Advanced Web Development:** Proficient with React, Next.js, and TypeScript.
        - **Expertise:** Deep architectural understanding of the website's component structure, routing, and build pipeline.
        - **Proven History:** Successfully completed **≥ 10 intermediate issues** in this repo.
        - **Consistency:** **≥ 3–4 months** of active, human-led contributions to this project.

        > [!NOTE]
        > **CI/CD Exception:** For issues focused on **GitHub Actions / Workflows**, the repo-specific thresholds above may be waived if the contributor demonstrates advanced-level proficiency in CI/CD.

        ### ⚠️ AI Usage Policy

        - Using AI to generate code for Advanced issues is **strictly discouraged**
        - AI may be used to help explain file relationships, but cannot be the main source of research.
        - Submitting AI-generated or unvalidated code is grounds for **immediate closure**

        ### ⏱️ Timeline & Workflow
        - **Typical time:** ~1 month / ~50 hours.
        - 🔴 Completing an advanced issue in 1–3 days is a **red flag** and will likely be rejected.
        - **Suggested:** Post your proposed architectural approach as a comment and wait for explicit maintainer approval **before writing any code.**

  - type: textarea
    id: domains
    attributes:
      label: 🔬 Technical Domains
      description: |
        Adapt as needed. Technical areas this issue touches to help developers self-select based on expertise.
      value: |
        <!-- Edit Technical Domains If needed -->

        - [ ] **Advanced React / Next.js** (Server Components, App Router, dynamic routing, middleware)
        - [ ] **Component Architecture** (design systems, reusable patterns, composition)
        - [ ] **Performance & Optimization** (Core Web Vitals, image optimization, code splitting, caching)
        - [ ] **Accessibility** (WCAG compliance, screen reader support, keyboard navigation)
        - [ ] **Build & Deployment** (Next.js config, CI/CD, hosting/deployment integration)
        - [ ] **Testing** (unit, integration, E2E, accessibility testing, visual regression)

  - type: textarea
    id: quality_standards
    attributes:
      label: 🛡️ Quality & Review Standards
      description: |
        Adapt as needed. The quality standards expected for advanced PRs.
      value: |
        Advanced PRs must be **"safe, maintainable, architecturally sound, and production-ready."**

        1. **Architectural Fit:** The solution must fit naturally into the existing website architecture.
        2. **Security & Correctness:** Evaluate all logic for injection risks, XSS vulnerabilities, or state corruption issues. 
        3. **Maintainability:** Code must be short and clear enough for any other maintainer to debug without your assistance. 
        4. **Backward Compatibility:** Existing pages, routes, and components must not break. If a breaking change is required, it must be explicitly managed.
        5. **Comprehensive Testing:** Must include unit and integration tests covering all new logic paths, edge cases, and failure modes. AI-generated tests based on AI-generated code are grounds for immediate rejection.

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ PR Quality Checklist
      description: |
        Adapt as needed. These are the standards the contributor must meet before opening a PR.
      value: |
        Before opening your PR, the contributor must confirm:
        - [ ] I have spent the majority of my time researching the problem and solution space extensively, including reviewing relevant code, documentation, and external resources.
        - [ ] I understand the system-wide impact of these changes on affected modules and performance.
        - [ ] The design fits with the current website's architectural approaches.
        - [ ] I have tested my changes extensively across browsers and screen sizes.
        - [ ] Every line of code is personally understood and explainable.

  - type: textarea
    id: resources
    attributes:
      label: 📚 Resources & Support
      value: |
        **References:**
        - [Next.js Documentation](https://nextjs.org/docs)
        - [React Documentation](https://react.dev)
        - [Tailwind CSS Documentation](https://tailwindcss.com/docs)
        - [Vitest Documentation](https://vitest.dev)
        - [Writing Blog Posts](https://github.com/hiero-ledger/hiero-website/blob/main/docs/blogs.md)

        **🆘 Stuck?**
        - [Community Calls](https://zoom-lfx.platform.linuxfoundation.org/meetings/hiero?view=week)
        - [Discord](https://github.com/hiero-ledger/sdk-collaboration-hub/blob/main/guides/issue-progression/for-developers/discord.md)
