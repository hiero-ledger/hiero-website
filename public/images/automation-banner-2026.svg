<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hiero Automation Banner</title>
  <desc id="desc">Banner image for a Hiero automation blog article.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b81a56"/>
      <stop offset="100%" stop-color="#8f1442"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <rect x="120" y="120" width="98" height="98" rx="12" fill="none" stroke="#ffffff" stroke-width="10"/>
  <rect x="145" y="145" width="26" height="52" fill="#ffffff"/>
  <rect x="171" y="171" width="22" height="26" fill="#ffffff"/>

  <text x="250" y="192" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="700">Hiero</text>
  <text x="120" y="370" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="700">Automation Across</text>
  <text x="120" y="490" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="700">The Organization</text>
  <text x="120" y="620" fill="#ffdbe8" font-family="Arial, Helvetica, sans-serif" font-size="48">Progress, Security, and Contributor Best Practices</text>
  <text x="120" y="760" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="36" opacity="0.9">HIERO.ORG/BLOG</text>
</svg>
