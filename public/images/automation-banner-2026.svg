  <rect width="720" height="654" fill="#C02266"/>

  <image href="/images/Hiero-Icon-wLogo-white-text.svg" x="175" y="74" width="370" height="126" preserveAspectRatio="xMidYMid meet"/>

  <text x="360" y="360" fill="#ffffff" text-anchor="middle"
