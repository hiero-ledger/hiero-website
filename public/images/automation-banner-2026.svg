<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="654" viewBox="0 0 720 654" role="img" aria-labelledby="title desc">
  <title id="title">Hiero Automation Banner</title>
